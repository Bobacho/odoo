[options]
; ==========================================
; Odoo Banco de la Nación - Configuración
; ==========================================

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = banco_nacion_sbs_2026
db_name = odoo_banco_nacion
admin_passwd = admin_sbs_banco_nacion_2026
dbfilter = odoo_banco_nacion

; Addons path
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Server configuration
xmlrpc_port = 8069
longpolling_port = 8072
workers = 2
max_cron_threads = 1
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192
limit_memory_soft = 2684354560
limit_memory_hard = 5368709120

; Audit & Logging
log_level = info
log_handler = :INFO,odoo.modules.loading:WARNING,odoo.sql_db:WARNING
logfile = /var/log/odoo/odoo.log
logrotate = True
log_db = True
log_db_level = 30

; Session & Cache
session_store = redis
redis_host = redis
redis_port = 6379
redis_pass = redis_banco_2026

; Security
list_db = False
proxy_mode = True
no_version_filter = False

; Email (SBS notifications)
email_from = notificaciones-sbs@banconacion.pe
smtp_server = smtp.banconacion.pe
smtp_port = 587
smtp_user = notificaciones-sbs@banconacion.pe
smtp_password = smtp_banco_2026
smtp_ssl = False
smtp_starttls = True

; Performance
server_wide_modules = base,web,banco_nacion
data_dir = /var/lib/odoo

; SBS Regulatorio
sbs_report_path = /var/odoo/sbs_reports
sbs_entity_code = 0001
sbs_notification_email = sbs-reportes@banconacion.pe
