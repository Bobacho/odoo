networks:
  banco_nacion_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ./volumes/postgres_data
      o: bind
  odoo_data:
    driver: local
    driver_opts:
      type: none
      device: ./volumes/odoo_data
      o: bind
  odoo_logs:
    driver: local
    driver_opts:
      type: none
      device: ./volumes/odoo_logs
      o: bind

services:

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: banco_nacion_db
    restart: unless-stopped
    networks:
      - banco_nacion_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Odoo Application Server
  # ==========================================
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: banco_nacion_odoo:17.0
    container_name: banco_nacion_odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - banco_nacion_network
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_logs:/var/log/odoo
      - ./odoo/custom_addons:/mnt/extra-addons
      - ./odoo/config:/etc/odoo
      - ./scripts:/scripts
    environment:
      - ODOO_ADMIN_PASSWORD=${ODOO_ADMIN_PASSWORD}
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT:-5432}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - TZ=${TZ}
    ports:
      - "${ODOO_PORT}:8069"
      - "${ODOO_LONGPOLLING_PORT}:8072"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8069 && echo -e 'GET / HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && head -1 <&3 | grep -q '200\\|301\\|302\\|303'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ==========================================
  # Nginx Reverse Proxy (SSL termination)
  # ==========================================
  nginx:
    image: nginx:1.27-alpine
    container_name: banco_nacion_nginx
    restart: unless-stopped
    depends_on:
      - odoo
    networks:
      - banco_nacion_network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================
  # Redis Cache (for sessions & performance)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: banco_nacion_redis
    restart: unless-stopped
    networks:
      - banco_nacion_network
    volumes:
      - ./volumes/redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_banco_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
