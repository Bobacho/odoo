<!--
   Wazuh Agent Configuration - Odoo Banco de la Nación
   ===================================================
-->
<ossec_config>
    <client>
        <server>
            <address>WAZUH_MANAGER_IP</address>
            <port>1514</port>
            <protocol>TCP</protocol>
        </server>
        <config-profile>odoo, banco_nacion, linux</config-profile>
        <notify_time>10</notify_time>
        <time-reconnect>60</time-reconnect>
        <auto_restart>yes</auto_restart>
        <crypto_method>aes</crypto_method>
    </client>

    <!-- Authentication with Wazuh Manager -->
    <auth>
        <enabled>yes</enabled>
        <use_password>yes</use_password>
        <registration_address>WAZUH_MANAGER_IP</registration_address>
        <registration_port>1515</registration_port>
        <password>WAZUH_REGISTRATION_PASSWORD</password>
        <ssl_agent_ca></ssl_agent_ca>
        <ssl_agent_cert></ssl_agent_cert>
        <ssl_agent_key></ssl_agent_key>
        <manager_address>WAZUH_MANAGER_IP</manager_address>
    </auth>

    <!-- Log monitoring: Odoo application logs -->
    <localfile>
        <location>/var/log/odoo/odoo.log</location>
        <log_format>syslog</log_format>
        <frequency>5</frequency>
    </localfile>

    <!-- Log monitoring: Odoo audit logs -->
    <localfile>
        <location>/var/log/odoo/odoo-audit.log</location>
        <log_format>syslog</log_format>
        <frequency>5</frequency>
    </localfile>

    <!-- Log monitoring: PostgreSQL logs -->
    <localfile>
        <location>/var/log/postgresql/postgresql-*.log</location>
        <log_format>syslog</log_format>
        <frequency>10</frequency>
    </localfile>

    <!-- Log monitoring: System auth logs -->
    <localfile>
        <location>/var/log/auth.log</location>
        <log_format>syslog</log_format>
        <frequency>10</frequency>
    </localfile>

    <!-- Log monitoring: System syslog -->
    <localfile>
        <location>/var/log/syslog</location>
        <log_format>syslog</log_format>
        <frequency>10</frequency>
    </localfile>

    <!-- Log monitoring: Docker logs -->
    <localfile>
        <location>/var/lib/docker/containers/*/*-json.log</location>
        <log_format>json</log_format>
        <frequency>10</frequency>
    </localfile>

    <!-- Inventory analysis -->
    <syscheck>
        <enabled>yes</enabled>
        <frequency>900</frequency>
        <scan_on_start>yes</scan_on_start>
        <auto_ignore>no</auto_ignore>
        <alert_new_files>yes</alert_new_files>

        <!-- Monitor critical Odoo directories -->
        <directories check_all="yes">/etc/odoo</directories>
        <directories check_all="yes">/mnt/extra-addons</directories>
        <directories check_all="yes">/var/lib/odoo</directories>
        <directories check_all="yes">/var/log/odoo</directories>
        <directories check_all="yes">/var/odoo/sbs_reports</directories>

        <!-- Ignore exceptions -->
        <ignore>/var/lib/odoo/sessions</ignore>
        <ignore>/var/lib/odoo/filestore</ignore>
    </syscheck>

    <!-- Rootcheck -->
    <rootcheck>
        <enabled>yes</enabled>
        <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
        <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>
        <frequency>3600</frequency>
    </rootcheck>

    <!-- Vulnerability detector -->
    <vulnerability-detector>
        <enabled>yes</enabled>
        <interval>1d</interval>
        <run_on_start>yes</run_on_start>
        <provider name="canonical">
            <enabled>yes</enabled>
            <os>focal</os>
            <os>jammy</os>
            <update_interval>1d</update_interval>
        </provider>
        <provider name="debian">
            <enabled>yes</enabled>
            <update_interval>1d</update_interval>
        </provider>
    </vulnerability-detector>

    <!-- Active response (automatic actions) -->
    <active-response>
        <disabled>no</disabled>
        <command>firewall-drop</command>
        <location>local</location>
        <level>10</level>
        <timeout>3600</timeout>
    </active-response>

    <active-response>
        <command>disable-account</command>
        <location>local</location>
        <level>12</level>
        <timeout>86400</timeout>
    </active-response>

    <!-- Command definitions -->
    <command>
        <name>firewall-drop</name>
        <executable>firewall-drop.sh</executable>
        <timeout_allowed>yes</timeout_allowed>
    </command>

    <command>
        <name>disable-account</name>
        <executable>disable-account.sh</executable>
        <timeout_allowed>yes</timeout_allowed>
    </command>

    <!-- Global configuration -->
    <global>
        <jsonout_output>yes</jsonout_output>
        <alerts_log>yes</alerts_log>
        <logall>yes</logall>
        <logall_json>yes</logall_json>
        <email_notification>yes</email_notification>
        <smtp_server>smtp.banconacion.pe</smtp_server>
        <email_from>wazuh@banconacion.pe</email_from>
        <email_to>soc@banconacion.pe</email_to>
        <email_maxperhour>12</email_maxperhour>
        <email_alert_level>10</email_alert_level>
    </global>

    <!-- Integrations -->
    <integration>
        <name>custom</name>
        <hook_url>http://localhost:8069/wazuh/webhook</hook_url>
        <level>8</level>
        <rule_id>100004,100006,100009,100012,100018</rule_id>
        <alert_format>json</alert_format>
    </integration>

    <!-- Internal options -->
    <internal>
        <log_level>2</log_level>
    </internal>
</ossec_config>
